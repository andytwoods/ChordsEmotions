<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chords &amp; Emotions</title>
  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css">
  <style>
    .chord-display {
      font-size: 2.4em;
      color: #2c3e50;
      padding: 30px 50px;
      border: 2px dashed #ccc;
      border-radius: 12px;
      margin: 20px auto;
      max-width: 420px;
      background: #f9f9f9;
      text-align: center;
    }
    .chord-label {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 6px;
    }
    .jspsych-content { max-width: 760px; }

    /* SAM button group layout */
    #jspsych-html-button-response-btngroup {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    #jspsych-html-button-response-btngroup .jspsych-btn {
      background: none;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    #jspsych-html-button-response-btngroup .jspsych-btn:hover {
      border-color: #4a90d9;
    }
    .sam-btn { text-align: center; }
    .sam-btn img {
      display: block;
      width: 66px;
      height: 66px;
      margin: 0 auto 4px;
      background: #e8e8e8;
    }
    .sam-btn .sam-num   { font-weight: bold; font-size: 1em; color: #333; }
    .sam-btn .sam-label { font-size: 0.70em; color: #555; margin-top: 2px; }

    /* Replay button */
    .replay-btn {
      background: #fff;
      border: 2px solid #4a90d9;
      border-radius: 8px;
      color: #4a90d9;
      cursor: pointer;
      font-size: 1em;
      padding: 8px 22px;
      margin-bottom: 20px;
      transition: background 0.15s, color 0.15s;
    }
    .replay-btn:hover { background: #4a90d9; color: #fff; }

    /* Free-text area */
    #emotion-text {
      display: block;
      width: 100%;
      max-width: 480px;
      font-size: 1em;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      margin: 0 auto 4px;
      box-sizing: border-box;
    }

    /* Adjective picker */
    .adjective-section {
      margin-top: 14px;
      text-align: center;
    }
    .adj-hint {
      font-size: 0.80em;
      color: #999;
      margin-bottom: 8px;
    }
    .adj-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      max-width: 560px;
      margin: 0 auto 12px;
    }
    .adj-btn {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 16px;
      color: #444;
      cursor: pointer;
      font-size: 0.85em;
      padding: 4px 12px;
      transition: background 0.12s, border-color 0.12s;
    }
    .adj-btn:hover  { background: #dce8f8; border-color: #4a90d9; color: #2c3e50; }
    .adj-btn.used   { background: #4a90d9; border-color: #4a90d9; color: #fff; }
  </style>
</head>
<body>
<script>

// ── Chord Synthesiser ─────────────────────────────────────────────────────────
//
// Change ACTIVE_INSTRUMENT to switch what instrument plays the chords.
// All synthesis is done in-browser via Tone.js — no MP3 chord files needed.
//
// Available instruments:
//   'acoustic_grand_piano'  – Salamander Grand Piano (highest quality, ~6 MB)
//   'electric_piano_1'      – Rhodes electric piano
//   'string_ensemble_1'     – String ensemble pad
//   'choir_aahs'            – Choir aahs
//   'acoustic_guitar_nylon' – Nylon-string guitar
//
const ACTIVE_INSTRUMENT = 'acoustic_grand_piano';

// Reverb settings (applied to all instruments)
const REVERB_DECAY = 1.8;   // seconds of tail
const REVERB_WET   = 0.22;  // 0 = dry, 1 = fully wet

// Root octave for all chords (4 = middle-C range, good for piano/strings)
const CHORD_OCTAVE = 4;

// Duration each chord sounds (ms). The pair plays chord1 → chord2 with no gap.
// Total audio per pair = 2 × CHORD_DURATION.
const CHORD_DURATION = 2000;

// ── Instrument definitions ────────────────────────────────────────────────────
const GLEITZ_BASE = 'https://gleitz.github.io/midi-js-soundfonts/FluidR3_GM/';

function gleitzUrls(noteNames) {
  return Object.fromEntries(noteNames.map(n => [n, n + '.mp3']));
}

const GLEITZ_SPREAD = ['A2','C3','Eb3','Gb3','A3','C4','Eb4','Gb4','A4','C5','Eb5','Gb5'];

const INSTRUMENTS = {
  acoustic_grand_piano: {
    label: 'Grand Piano (Salamander)',
    baseUrl: 'https://tonejs.github.io/audio/salamander/',
    urls: {
      'A0':'A0.mp3',  'C1':'C1.mp3',  'D#1':'Ds1.mp3', 'F#1':'Fs1.mp3',
      'A1':'A1.mp3',  'C2':'C2.mp3',  'D#2':'Ds2.mp3', 'F#2':'Fs2.mp3',
      'A2':'A2.mp3',  'C3':'C3.mp3',  'D#3':'Ds3.mp3', 'F#3':'Fs3.mp3',
      'A3':'A3.mp3',  'C4':'C4.mp3',  'D#4':'Ds4.mp3', 'F#4':'Fs4.mp3',
      'A4':'A4.mp3',  'C5':'C5.mp3',  'D#5':'Ds5.mp3', 'F#5':'Fs5.mp3',
      'A5':'A5.mp3',  'C6':'C6.mp3',  'D#6':'Ds6.mp3', 'F#6':'Fs6.mp3',
      'A6':'A6.mp3',  'C7':'C7.mp3',  'D#7':'Ds7.mp3', 'F#7':'Fs7.mp3',
      'A7':'A7.mp3',  'C8':'C8.mp3',
    },
  },

  electric_piano_1: {
    label: 'Electric Piano (Rhodes)',
    baseUrl: GLEITZ_BASE + 'electric_piano_1-mp3/',
    urls: gleitzUrls(GLEITZ_SPREAD),
  },

  string_ensemble_1: {
    label: 'String Ensemble',
    baseUrl: GLEITZ_BASE + 'string_ensemble_1-mp3/',
    urls: gleitzUrls(GLEITZ_SPREAD),
  },

  choir_aahs: {
    label: 'Choir (Aahs)',
    baseUrl: GLEITZ_BASE + 'choir_aahs-mp3/',
    urls: gleitzUrls(GLEITZ_SPREAD),
  },

  acoustic_guitar_nylon: {
    label: 'Nylon Guitar',
    baseUrl: GLEITZ_BASE + 'acoustic_guitar_nylon-mp3/',
    urls: gleitzUrls(GLEITZ_SPREAD),
  },
};

// ── Synth internals ───────────────────────────────────────────────────────────

const synth = { sampler: null, reverb: null, ready: false };

async function initSynth() {
  const cfg = INSTRUMENTS[ACTIVE_INSTRUMENT];
  if (!cfg) { console.error('[ChordSynth] Unknown instrument:', ACTIVE_INSTRUMENT); return; }
  console.log('[ChordSynth] Loading', cfg.label, '…');

  synth.reverb = new Tone.Reverb({ decay: REVERB_DECAY, preDelay: 0.01, wet: REVERB_WET });
  await synth.reverb.ready;
  synth.reverb.toDestination();

  synth.sampler = new Tone.Sampler({
    urls: cfg.urls,
    baseUrl: cfg.baseUrl,
    onload:  () => { synth.ready = true; console.log('[ChordSynth] Ready —', cfg.label); },
    onerror: (err) => console.error('[ChordSynth] Sample load error:', err),
  });
  synth.sampler.connect(synth.reverb);
}

// ── Chord → notes conversion ──────────────────────────────────────────────────

const NOTE_SEMITONE = {
  'C':0, 'C#':1, 'Db':1, 'D':2, 'D#':3, 'Eb':3, 'E':4,
  'F':5, 'F#':6, 'Gb':6, 'G':7, 'G#':8, 'Ab':8,
  'A':9, 'A#':10, 'Bb':10, 'B':11,
};

const SEMITONE_NAME = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const CHORD_INTERVALS = {
  major: [0, 4, 7],
  minor: [0, 3, 7],
};

function chordToNotes(chordName, octave = CHORD_OCTAVE) {
  const [rootName, quality] = chordName.split(' ');
  const rootMidi = (octave + 1) * 12 + NOTE_SEMITONE[rootName];
  return CHORD_INTERVALS[quality].map(interval => {
    const midi = rootMidi + interval;
    return SEMITONE_NAME[midi % 12] + (Math.floor(midi / 12) - 1);
  });
}

// ── Playback helpers ──────────────────────────────────────────────────────────

function playChord(chordName) {
  if (!synth.ready) return;
  synth.sampler.triggerAttack(chordToNotes(chordName), Tone.now());
}

function stopAllNotes() {
  synth.sampler?.releaseAll();
}

// ── Chord-pair replay ─────────────────────────────────────────────────────────
// replayPair() is called from onclick in stimulus HTML.
// _currentPair is set by each free-text trial's on_load.

let _currentPair = null;
let _replayTimers = [];

function _clearReplayTimers() {
  _replayTimers.forEach(clearTimeout);
  _replayTimers = [];
}

function replayPair() {
  _clearReplayTimers();
  stopAllNotes();
  if (!_currentPair) return;
  const { chord1, chord2 } = _currentPair;
  playChord(chord1);
  _replayTimers.push(setTimeout(() => { stopAllNotes(); playChord(chord2); }, CHORD_DURATION));
  _replayTimers.push(setTimeout(() => stopAllNotes(), CHORD_DURATION * 2));
}

// ── Adjective picker ──────────────────────────────────────────────────────────
// Clicking an adjective appends it to the textarea and marks the button.

const ADJECTIVES = [
  'bright',    'joyful',      'warm',        'uplifting',  'hopeful',   'tender',
  'dark',      'somber',      'melancholic',  'heavy',      'bleak',     'cold',
  'tense',     'anxious',     'uneasy',       'dramatic',   'restless',
  'calm',      'peaceful',    'serene',       'gentle',     'dreamy',
  'mysterious','nostalgic',   'bittersweet',  'wistful',    'longing',   'unresolved',
];

function addAdjective(word, btn) {
  btn.classList.add('used');
  btn.disabled = true;
  const ta = document.getElementById('emotion-text');
  if (!ta) return;
  const cur = ta.value.trim();
  ta.value = cur ? cur + ', ' + word : word;
}

// ── Resume AudioContext on first user interaction (browser autoplay policy) ───
['click', 'keydown', 'touchstart'].forEach(evt =>
  document.addEventListener(evt, () => Tone.start(), { once: true, passive: true })
);

initSynth();

// ── jsPsych init ──────────────────────────────────────────────────────────────
const jsPsych = initJsPsych({
  show_progress_bar: true,
  auto_update_progress_bar: false,
  on_finish: function () {
    // TODO (Pavlovia): replace body below with the pavlovia plugin finish call.
    document.body.innerHTML =
      '<div style="padding:40px;font-family:monospace;white-space:pre-wrap">' +
      jsPsych.data.get().csv() +
      '</div>';
  }
});

let pairsCompleted = 0;

// ── Chord pairs ───────────────────────────────────────────────────────────────
const CHORD_PAIRS = [
  // --- Parallel major → minor ---
  { id:  1, chord1: "C major",  chord2: "C minor"  },
  { id:  2, chord1: "C# major", chord2: "C# minor" },
  { id:  3, chord1: "D major",  chord2: "D minor"  },
  { id:  4, chord1: "Eb major", chord2: "Eb minor" },
  { id:  5, chord1: "E major",  chord2: "E minor"  },
  { id:  6, chord1: "F major",  chord2: "F minor"  },
  { id:  7, chord1: "F# major", chord2: "F# minor" },
  { id:  8, chord1: "G major",  chord2: "G minor"  },
  { id:  9, chord1: "Ab major", chord2: "Ab minor" },
  { id: 10, chord1: "A major",  chord2: "A minor"  },
  { id: 11, chord1: "Bb major", chord2: "Bb minor" },
  { id: 12, chord1: "B major",  chord2: "B minor"  },
  // --- Parallel minor → major ---
  { id: 13, chord1: "C minor",  chord2: "C major"  },
  { id: 14, chord1: "C# minor", chord2: "C# major" },
  { id: 15, chord1: "D minor",  chord2: "D major"  },
  { id: 16, chord1: "Eb minor", chord2: "Eb major" },
  { id: 17, chord1: "E minor",  chord2: "E major"  },
  { id: 18, chord1: "F minor",  chord2: "F major"  },
  { id: 19, chord1: "F# minor", chord2: "F# major" },
  { id: 20, chord1: "G minor",  chord2: "G major"  },
  { id: 21, chord1: "Ab minor", chord2: "Ab major" },
  { id: 22, chord1: "A minor",  chord2: "A major"  },
  { id: 23, chord1: "Bb minor", chord2: "Bb major" },
  { id: 24, chord1: "B minor",  chord2: "B major"  },
  // --- Relative major → minor ---
  { id: 25, chord1: "C major",  chord2: "A minor"  },
  { id: 26, chord1: "G major",  chord2: "E minor"  },
  { id: 27, chord1: "D major",  chord2: "B minor"  },
  { id: 28, chord1: "A major",  chord2: "F# minor" },
  { id: 29, chord1: "E major",  chord2: "C# minor" },
  { id: 30, chord1: "B major",  chord2: "G# minor" },
  { id: 31, chord1: "F# major", chord2: "D# minor" },
  { id: 32, chord1: "Db major", chord2: "Bb minor" },
  { id: 33, chord1: "Ab major", chord2: "F minor"  },
  { id: 34, chord1: "Eb major", chord2: "C minor"  },
  { id: 35, chord1: "Bb major", chord2: "G minor"  },
  { id: 36, chord1: "F major",  chord2: "D minor"  },
  // --- Relative minor → major ---
  { id: 37, chord1: "A minor",  chord2: "C major"  },
  { id: 38, chord1: "E minor",  chord2: "G major"  },
  { id: 39, chord1: "B minor",  chord2: "D major"  },
  { id: 40, chord1: "F# minor", chord2: "A major"  },
  { id: 41, chord1: "C# minor", chord2: "E major"  },
  { id: 42, chord1: "G# minor", chord2: "B major"  },
  { id: 43, chord1: "D# minor", chord2: "F# major" },
  { id: 44, chord1: "Bb minor", chord2: "Db major" },
  { id: 45, chord1: "F minor",  chord2: "Ab major" },
  { id: 46, chord1: "C minor",  chord2: "Eb major" },
  { id: 47, chord1: "G minor",  chord2: "Bb major" },
  { id: 48, chord1: "D minor",  chord2: "F major"  },
];

// ── SAM scale definitions ─────────────────────────────────────────────────────
const VALENCE = [
  { value: 1, img: "img/sam_valence_1.png", desc: "Very unpleasant" },
  { value: 2, img: "img/sam_valence_2.png", desc: "Unpleasant"      },
  { value: 3, img: "img/sam_valence_3.png", desc: "Neutral"         },
  { value: 4, img: "img/sam_valence_4.png", desc: "Pleasant"        },
  { value: 5, img: "img/sam_valence_5.png", desc: "Very pleasant"   },
];

const AROUSAL = [
  { value: 1, img: "img/sam_arousal_1.png", desc: "Very calm"    },
  { value: 2, img: "img/sam_arousal_2.png", desc: "Calm"         },
  { value: 3, img: "img/sam_arousal_3.png", desc: "Moderate"     },
  { value: 4, img: "img/sam_arousal_4.png", desc: "Excited"      },
  { value: 5, img: "img/sam_arousal_5.png", desc: "Very excited" },
];

function samChoices(scale) {
  return scale.map(s =>
    `<div class="sam-btn">
       <img src="${s.img}" alt="${s.desc}">
       <div class="sam-num">${s.value}</div>
       <div class="sam-label">${s.desc}</div>
     </div>`
  );
}

function samStimulus(question) {
  return `<p style="font-size:1.1em;margin-bottom:6px">${question}</p>
          <p style="color:#999;font-size:0.85em">Click an image <em>or</em> press <strong>1–5</strong>:</p>`;
}

function samOnLoad() {
  function handler(e) {
    if (e.key >= '1' && e.key <= '5') {
      document.removeEventListener('keydown', handler);
      const idx = parseInt(e.key) - 1;
      const btns = document.querySelectorAll('#jspsych-html-button-response-btngroup button');
      const btn = btns[idx];
      if (btn) btn.click();
    }
  }
  document.addEventListener('keydown', handler);
}

// ── Timeline ──────────────────────────────────────────────────────────────────
const timeline = [];

function keyAlsoClicks() {
  function handler() {
    document.removeEventListener('keydown', handler);
    document.querySelector('.jspsych-btn')?.click();
  }
  document.addEventListener('keydown', handler);
}

// Welcome
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Chords &amp; Emotions</h2>
    <p>Welcome! In this study you will listen to pairs of musical chords<br>
       and share your emotional impressions of each pair.</p>
    <p>The study contains <strong>48 chord pairs</strong> and takes approximately
       <strong>25–35 minutes</strong>.</p>
    <p style="color:#555">Please use headphones if possible.</p>
  `,
  choices: ["Continue"],
  on_load: keyAlsoClicks,
  on_finish: () => Tone.start(),
});

// Instructions
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h3>Instructions</h3>
    <p>On each trial you will:</p>
    <ol style="text-align:left;display:inline-block;line-height:2">
      <li>Hear two chords played back-to-back as a single continuous sound</li>
      <li>Use the <strong>Replay</strong> button to hear the pair again as many times as you need</li>
      <li>Type a few words describing the <em>emotional feel</em> of the pair,
          and/or pick from the suggested descriptors</li>
      <li>Rate how <strong>pleasant/unpleasant</strong> the pair felt (Valence)</li>
      <li>Rate how <strong>calm/excited</strong> the pair felt (Arousal)</li>
    </ol>
    <p>Focus on the two chords as a single entity — the relationship between them,
       not each chord individually.</p>
    <p>There are no right or wrong answers — go with your gut.</p>
  `,
  choices: ["Start experiment"],
  on_load: keyAlsoClicks,
});

// Trials
const shuffledPairs = jsPsych.randomization.shuffle([...CHORD_PAIRS]);

// Pre-build adjective picker HTML (same for every trial)
const adjPickerHtml = ADJECTIVES.map(w =>
  `<button class="adj-btn" onclick="addAdjective('${w}',this)">${w}</button>`
).join('');

for (const pair of shuffledPairs) {

  // Fixation
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="font-size:3em;color:#aaa">+</div>',
    choices: "NO_KEYS",
    trial_duration: 600,
  });

  // Combined chord pair — chord1 plays immediately into chord2, no gap
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <p class="chord-label">Listen to the chord pair</p>
      <div class="chord-display">&#9835;</div>
    `,
    choices: "NO_KEYS",
    trial_duration: CHORD_DURATION * 2,
    on_load: () => {
      function tryPlay() {
        if (synth.ready) {
          playChord(pair.chord1);
          setTimeout(() => { stopAllNotes(); playChord(pair.chord2); }, CHORD_DURATION);
        } else {
          setTimeout(tryPlay, 50);
        }
      }
      tryPlay();
    },
    on_finish: () => stopAllNotes(),
    data: { phase: "audio", pair_id: pair.id, chord1: pair.chord1, chord2: pair.chord2 },
  });

  // Free-text description + replay + adjective picker
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div style="text-align:center">
        <button class="replay-btn" onclick="replayPair()">&#x21BA;&ensp;Replay chord pair</button>
        <p style="margin:0 0 8px">In a few words, describe the emotional quality of this chord pair:</p>
        <textarea id="emotion-text" rows="3"
          placeholder="e.g. tense, melancholic, hopeful, unresolved\u2026"></textarea>
        <div class="adjective-section">
          <p class="adj-hint">Stuck? click words to add them to your description:</p>
          <div class="adj-grid">${adjPickerHtml}</div>
        </div>
      </div>
    `,
    choices: ['Continue &rarr;'],
    on_load: () => {
      _currentPair = pair;
    },
    on_finish: function(data) {
      _clearReplayTimers();
      stopAllNotes();
      data.free_text = document.getElementById('emotion-text')?.value ?? '';
    },
    data: { phase: "free_text", pair_id: pair.id, chord1: pair.chord1, chord2: pair.chord2 },
  });

  // SAM Valence
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: samStimulus('How <em>pleasant</em> or <em>unpleasant</em> did this chord pair feel?'),
    choices: samChoices(VALENCE),
    on_load: samOnLoad,
    data: { phase: "valence", pair_id: pair.id, chord1: pair.chord1, chord2: pair.chord2 },
    on_finish: function(data) { data.valence = VALENCE[data.response].value; },
  });

  // SAM Arousal
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: samStimulus('How <em>calm</em> or <em>excited</em> did this chord pair feel?'),
    choices: samChoices(AROUSAL),
    on_load: samOnLoad,
    data: { phase: "arousal", pair_id: pair.id, chord1: pair.chord1, chord2: pair.chord2 },
    on_finish: function(data) {
      data.arousal = AROUSAL[data.response].value;
      pairsCompleted++;
      jsPsych.progressBar.progress = pairsCompleted / CHORD_PAIRS.length;
    },
  });
}

// Debrief
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <h2>Thank you!</h2>
    <p>You have completed all 48 chord pairs.</p>
    <p>Your responses are being saved.</p>
  `,
  choices: ["Finish"],
  on_load: keyAlsoClicks,
});

jsPsych.run(timeline);

</script>
</body>
</html>
